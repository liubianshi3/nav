syntax = "proto3";

package physical.device;

option go_package = "github.com/feishu/core/proto/device";

service RobotDogService {
  rpc Move(MoveRequest) returns (MoveResponse);
  rpc Stop(StopRequest) returns (StopResponse);
  rpc GetBattery(BatteryRequest) returns (BatteryResponse);
  rpc SetPosture(PostureRequest) returns (PostureResponse);
  rpc GetPose(PoseRequest) returns (PoseResponse);
  rpc Walk(WalkRequest) returns (WalkResponse);
  rpc GetSensors(SensorsRequest) returns (SensorsResponse);
  rpc SetMode(SetModeRequest) returns (SetModeResponse);
  rpc GetMode(GetModeRequest) returns (GetModeResponse);
  rpc WatchRobotDogStatus(WatchRobotDogStatusRequest) returns (stream RobotDogStatus);
  rpc BalanceStand(BalanceStandRequest) returns (BalanceStandResponse);
  rpc StandUp(StandUpRequest) returns (StandUpResponse);
  rpc StandDown(StandDownRequest) returns (StandDownResponse);
  rpc RecoveryStand(RecoveryStandRequest) returns (RecoveryStandResponse);
  rpc Damp(DampRequest) returns (DampResponse);
  rpc SetAutoRecovery(SetAutoRecoveryRequest) returns (SetAutoRecoveryResponse);
  rpc SwitchGait(SwitchGaitRequest) returns (SwitchGaitResponse);
  rpc SetSpeedLevel(SetSpeedLevelRequest) returns (SetSpeedLevelResponse);
  rpc SetBodyHeight(SetBodyHeightRequest) returns (SetBodyHeightResponse);
  rpc GetControlState(GetControlStateRequest) returns (GetControlStateResponse);
  rpc AuthorizeMotion(AuthorizeMotionRequest) returns (AuthorizeMotionResponse);
  rpc ReleaseMotionAuthorization(ReleaseMotionAuthorizationRequest) returns (ReleaseMotionAuthorizationResponse);
  rpc GetMotionAuthorization(GetMotionAuthorizationRequest) returns (GetMotionAuthorizationResponse);
}

enum RobotDogMode {
  ROBOT_DOG_MODE_UNSPECIFIED = 0;
  ROBOT_DOG_MODE_REMOTE_CONTROL = 1;
  ROBOT_DOG_MODE_API = 2;
}

message SetModeRequest {
  string device_id = 1;
  RobotDogMode mode = 2;
}

message SetModeResponse {
  bool success = 1;
  string message = 2;
}

message GetModeRequest {
  string device_id = 1;
}

message GetModeResponse {
  RobotDogMode mode = 1;
}

message MoveRequest {
  string device_id = 1;
  float velocity_x = 2;
  float velocity_y = 3;
  float angular_velocity = 4;
  int32 pointIndex = 5;
}

message MoveResponse {
  bool success = 1;
  string message = 2;
  string task_id = 3;
}

message StopRequest {
  string device_id = 1;
  StopType type = 2;
}

enum StopType {
  STOP_TYPE_UNSPECIFIED = 0;
  STOP_TYPE_IMMEDIATE = 1;
  STOP_TYPE_SMOOTH = 2;
}

message StopResponse {
  bool success = 1;
  string message = 2;
}

message BatteryRequest {
  string device_id = 1;
}

message BatteryResponse {
  int32 percentage = 1;
  bool is_charging = 2;
  int32 estimated_minutes = 3;
  BatteryHealth health = 4;
}

enum BatteryHealth {
  BATTERY_HEALTH_UNSPECIFIED = 0;
  BATTERY_HEALTH_GOOD = 1;
  BATTERY_HEALTH_FAIR = 2;
  BATTERY_HEALTH_POOR = 3;
}

message PostureRequest {
  string device_id = 1;
  PostureType posture = 2;
  int32 duration_ms = 3;
}

enum PostureType {
  POSTURE_TYPE_UNSPECIFIED = 0;
  POSTURE_TYPE_STAND = 1;
  POSTURE_TYPE_SIT = 2;
  POSTURE_TYPE_LIE = 3;
  POSTURE_TYPE_STRETCH = 4;
}

message PostureResponse {
  bool success = 1;
  string message = 2;
}

message PoseRequest {
  string device_id = 1;
}

message PoseResponse {
  float position_x = 1;
  float position_y = 2;
  float position_z = 3;
  float rotation_x = 4;
  float rotation_y = 5;
  float rotation_z = 6;
  float rotation_w = 7;
}

message WalkRequest {
  string device_id = 1;
  float x = 2;
  float y = 3;
  float theta = 4;
  WalkMode mode = 5;
  int32 pointIndex = 6;
}

enum WalkMode {
  WALK_MODE_UNSPECIFIED = 0;
  WALK_MODE_NORMAL = 1;
  WALK_MODE_CRAWL = 2;
  WALK_MODE_TROT = 3;
}

message WalkResponse {
  bool success = 1;
  string message = 2;
  string task_id = 3;
}

message SensorsRequest {
  string device_id = 1;
}

message SensorsResponse {
  repeated SensorData sensors = 1;
  int64 timestamp = 2;
}

message SensorData {
  string name = 1;
  float value = 2;
  string unit = 3;
}

message WatchRobotDogStatusRequest {
  string device_id = 1;
}

message RobotDogStatus {
  string device_id = 1;
  PoseResponse pose = 2;
  BatteryResponse battery = 3;
  repeated SensorData sensors = 4;
  RobotDogState state = 5;
  int64 timestamp = 6;
  RobotDogMode mode = 7;
}

enum RobotDogState {
  ROBOT_DOG_STATE_UNSPECIFIED = 0;
  ROBOT_DOG_STATE_IDLE = 1;
  ROBOT_DOG_STATE_MOVING = 2;
  ROBOT_DOG_STATE_STOPPING = 3;
  ROBOT_DOG_STATE_CHARGING = 4;
}

enum MotionAuthorizationState {
  MOTION_AUTHORIZATION_STATE_UNSPECIFIED = 0;
  MOTION_AUTHORIZATION_STATE_UNKNOWN = 1;
  MOTION_AUTHORIZATION_STATE_STAND_DOWN = 2;
  MOTION_AUTHORIZATION_STATE_STANDING_NOT_AUTHORIZED = 3;
  MOTION_AUTHORIZATION_STATE_MANUAL_START_REQUIRED = 4;
  MOTION_AUTHORIZATION_STATE_AUTHORIZED = 5;
  MOTION_AUTHORIZATION_STATE_MOVING = 6;
  MOTION_AUTHORIZATION_STATE_ERROR = 7;
}

enum MotionAuthorizationAction {
  MOTION_AUTHORIZATION_ACTION_UNSPECIFIED = 0;
  MOTION_AUTHORIZATION_ACTION_NONE = 1;
  MOTION_AUTHORIZATION_ACTION_STAND_UP = 2;
  MOTION_AUTHORIZATION_ACTION_PRESS_REMOTE_START = 3;
  MOTION_AUTHORIZATION_ACTION_STOP = 4;
}

message BalanceStandRequest {
  string device_id = 1;
}

message BalanceStandResponse {
  bool success = 1;
  string message = 2;
  int32 sdk_code = 3;
  string error_code = 4;
  string runtime_mode = 5;
  string state = 6;
}

message StandUpRequest {
  string device_id = 1;
}

message StandUpResponse {
  bool success = 1;
  string message = 2;
  int32 sdk_code = 3;
  string error_code = 4;
  string runtime_mode = 5;
  string state = 6;
}

message StandDownRequest {
  string device_id = 1;
}

message StandDownResponse {
  bool success = 1;
  string message = 2;
  int32 sdk_code = 3;
  string error_code = 4;
  string runtime_mode = 5;
  string state = 6;
}

message RecoveryStandRequest {
  string device_id = 1;
}

message RecoveryStandResponse {
  bool success = 1;
  string message = 2;
  int32 sdk_code = 3;
  string error_code = 4;
  string runtime_mode = 5;
  string state = 6;
}

message DampRequest {
  string device_id = 1;
}

message DampResponse {
  bool success = 1;
  string message = 2;
  int32 sdk_code = 3;
  string error_code = 4;
  string runtime_mode = 5;
  string state = 6;
}

message SetAutoRecoveryRequest {
  string device_id = 1;
  bool enabled = 2;
}

message SetAutoRecoveryResponse {
  bool success = 1;
  string message = 2;
  int32 sdk_code = 3;
  string error_code = 4;
  string runtime_mode = 5;
  string state = 6;
}

message SwitchGaitRequest {
  string device_id = 1;
  int32 gait_type = 2;
}

message SwitchGaitResponse {
  bool success = 1;
  string message = 2;
  int32 sdk_code = 3;
  string error_code = 4;
  string runtime_mode = 5;
  string state = 6;
}

message SetSpeedLevelRequest {
  string device_id = 1;
  int32 level = 2;
}

message SetSpeedLevelResponse {
  bool success = 1;
  string message = 2;
  int32 sdk_code = 3;
  string error_code = 4;
  string runtime_mode = 5;
  string state = 6;
}

message SetBodyHeightRequest {
  string device_id = 1;
  float height = 2;
}

message SetBodyHeightResponse {
  bool success = 1;
  string message = 2;
  int32 sdk_code = 3;
  string error_code = 4;
  string runtime_mode = 5;
  string state = 6;
}

message GetControlStateRequest {
  string device_id = 1;
}

message GetControlStateResponse {
  string device_id = 1;
  string runtime_mode = 2;
  string state = 3;
  bool ready = 4;
  string reason = 5;
  string interface_name = 6;
  bool gait_control_enabled = 7;
  int32 gait_type = 8;
  int32 speed_level = 9;
  float body_height = 10;
  bool auto_recovery = 11;
  string last_command = 12;
  int32 last_sdk_code = 13;
  string last_error_code = 14;
  string last_error_reason = 15;
  int64 timestamp = 16;
}

message AuthorizeMotionRequest {
  string device_id = 1;
}

message AuthorizeMotionResponse {
  bool success = 1;
  string message = 2;
  string error_code = 3;
  MotionAuthorizationState state = 4;
  MotionAuthorizationAction required_action = 5;
  bool standing = 6;
  bool motion_authorized = 7;
  bool manual_start_required = 8;
  int32 motion_mode = 9;
  int32 gait_type = 10;
  string runtime_mode = 11;
  int64 timestamp = 12;
  int32 sdk_code = 13;
}

message ReleaseMotionAuthorizationRequest {
  string device_id = 1;
}

message ReleaseMotionAuthorizationResponse {
  bool success = 1;
  string message = 2;
  string error_code = 3;
  MotionAuthorizationState state = 4;
  MotionAuthorizationAction required_action = 5;
  bool standing = 6;
  bool motion_authorized = 7;
  bool manual_start_required = 8;
  int32 motion_mode = 9;
  int32 gait_type = 10;
  string runtime_mode = 11;
  int64 timestamp = 12;
  int32 sdk_code = 13;
}

message GetMotionAuthorizationRequest {
  string device_id = 1;
}

message GetMotionAuthorizationResponse {
  bool success = 1;
  string message = 2;
  string error_code = 3;
  MotionAuthorizationState state = 4;
  MotionAuthorizationAction required_action = 5;
  bool standing = 6;
  bool motion_authorized = 7;
  bool manual_start_required = 8;
  int32 motion_mode = 9;
  int32 gait_type = 10;
  string runtime_mode = 11;
  int64 timestamp = 12;
  int32 sdk_code = 13;
}
