<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760" width="1200" height="760">
  <style>
    text {
      font-family: "Helvetica Neue", Helvetica, Arial, "PingFang SC", "Microsoft YaHei", sans-serif;
      fill: #111827;
    }
    .title { font-size: 22px; font-weight: 700; }
    .subtitle { font-size: 12px; fill: #6b7280; }
    .lane-label { font-size: 11px; font-weight: 700; letter-spacing: 0.04em; fill: #4b5563; }
    .node-title { font-size: 14px; font-weight: 700; }
    .node-sub { font-size: 11px; fill: #6b7280; }
    .small { font-size: 10px; fill: #6b7280; }
    .label { font-size: 11px; font-weight: 600; }
    .legend { font-size: 11px; fill: #4b5563; }
    .mono { font-family: Menlo, Consolas, "Liberation Mono", monospace; font-size: 10px; fill: #374151; }
  </style>

  <defs>
    <marker id="arrow-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2563eb"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#16a34a"/>
    </marker>
    <marker id="arrow-r" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#dc2626"/>
    </marker>
    <marker id="arrow-purple" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#9333ea"/>
    </marker>
    <marker id="arrow-gray" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6b7280"/>
    </marker>
  </defs>

  <rect width="1200" height="760" fill="#ffffff"/>
  <text x="42" y="44" class="title">A2 DDS and ROS Data Flow</text>
  <text x="42" y="65" class="subtitle">Main ROS graph stays on CycloneDDS; Unitree bridge ROS side stays on FastDDS to avoid SDK2 CycloneDDS domain collision.</text>

  <!-- Lanes -->
  <rect x="34" y="95" width="208" height="560" rx="8" fill="#fff7ed" stroke="#fed7aa" stroke-width="1.3" stroke-dasharray="7,5"/>
  <text x="52" y="119" class="lane-label">ROBOT BODY</text>

  <rect x="268" y="95" width="238" height="560" rx="8" fill="#faf5ff" stroke="#ddd6fe" stroke-width="1.3" stroke-dasharray="7,5"/>
  <text x="286" y="119" class="lane-label">UNITREE SDK BRIDGE PROCESS</text>

  <rect x="532" y="95" width="350" height="560" rx="8" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.3" stroke-dasharray="7,5"/>
  <text x="550" y="119" class="lane-label">ROS MAIN GRAPH</text>

  <rect x="908" y="95" width="250" height="560" rx="8" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1.3" stroke-dasharray="7,5"/>
  <text x="926" y="119" class="lane-label">WEB / OPERATOR</text>

  <!-- Robot body -->
  <rect x="62" y="162" width="150" height="105" rx="8" fill="#ffffff" stroke="#fb923c" stroke-width="1.8"/>
  <text x="137" y="193" text-anchor="middle" class="node-title">A2 firmware</text>
  <text x="137" y="214" text-anchor="middle" class="node-sub">motor, battery, state</text>
  <text x="137" y="235" text-anchor="middle" class="mono">SDK DDS topics</text>

  <rect x="62" y="404" width="150" height="105" rx="8" fill="#ffffff" stroke="#fb923c" stroke-width="1.8"/>
  <text x="137" y="435" text-anchor="middle" class="node-title">JT128 lidar</text>
  <text x="137" y="456" text-anchor="middle" class="node-sub">front pointcloud</text>
  <text x="137" y="477" text-anchor="middle" class="node-sub">IMU stream</text>

  <!-- SDK internals -->
  <rect x="294" y="145" width="186" height="90" rx="8" fill="#ffffff" stroke="#a855f7" stroke-width="1.8"/>
  <text x="387" y="176" text-anchor="middle" class="node-title">Unitree SDK2</text>
  <text x="387" y="197" text-anchor="middle" class="node-sub">creates CycloneDDS</text>
  <text x="387" y="216" text-anchor="middle" class="mono">libddsc / SDK domain</text>

  <rect x="294" y="278" width="186" height="100" rx="8" fill="#ffffff" stroke="#f59e0b" stroke-width="1.8"/>
  <text x="387" y="309" text-anchor="middle" class="node-title">a2_sdk_bridge</text>
  <text x="387" y="330" text-anchor="middle" class="node-sub">ROS side: FastDDS</text>
  <text x="387" y="351" text-anchor="middle" class="mono">rmw_fastrtps_cpp</text>

  <rect x="294" y="443" width="186" height="104" rx="8" fill="#ffffff" stroke="#f59e0b" stroke-width="1.8"/>
  <text x="387" y="475" text-anchor="middle" class="node-title">a2_control_bridge</text>
  <text x="387" y="496" text-anchor="middle" class="node-sub">safety gates, limits</text>
  <text x="387" y="517" text-anchor="middle" class="mono">rmw_fastrtps_cpp</text>

  <rect x="287" y="575" width="205" height="52" rx="8" fill="#fef2f2" stroke="#fecaca" stroke-width="1.3"/>
  <text x="389" y="596" text-anchor="middle" class="label">Do not switch bridge to CycloneDDS</text>
  <text x="389" y="614" text-anchor="middle" class="small">SDK2 can collide creating the same domain</text>

  <!-- ROS main graph -->
  <rect x="560" y="141" width="288" height="68" rx="8" fill="#ffffff" stroke="#60a5fa" stroke-width="1.8"/>
  <text x="704" y="169" text-anchor="middle" class="node-title">ROS 2 graph transport</text>
  <text x="704" y="190" text-anchor="middle" class="mono">RMW_IMPLEMENTATION=rmw_cyclonedds_cpp</text>

  <rect x="560" y="247" width="130" height="88" rx="8" fill="#ffffff" stroke="#60a5fa" stroke-width="1.8"/>
  <text x="625" y="278" text-anchor="middle" class="node-title">state publisher</text>
  <text x="625" y="299" text-anchor="middle" class="node-sub">raw state to TF</text>
  <text x="625" y="318" text-anchor="middle" class="mono">/odom, /imu</text>

  <rect x="718" y="247" width="130" height="88" rx="8" fill="#ffffff" stroke="#60a5fa" stroke-width="1.8"/>
  <text x="783" y="278" text-anchor="middle" class="node-title">diagnostics</text>
  <text x="783" y="299" text-anchor="middle" class="node-sub">status, battery</text>
  <text x="783" y="318" text-anchor="middle" class="mono">/diagnostics</text>

  <rect x="560" y="392" width="132" height="92" rx="8" fill="#ffffff" stroke="#60a5fa" stroke-width="1.8"/>
  <text x="626" y="423" text-anchor="middle" class="node-title">DLIO / map</text>
  <text x="626" y="444" text-anchor="middle" class="node-sub">pointcloud, odom</text>
  <text x="626" y="465" text-anchor="middle" class="mono">/jt128/*</text>

  <rect x="718" y="392" width="130" height="92" rx="8" fill="#ffffff" stroke="#60a5fa" stroke-width="1.8"/>
  <text x="783" y="423" text-anchor="middle" class="node-title">Nav2 + safety</text>
  <text x="783" y="444" text-anchor="middle" class="node-sub">goal to velocity</text>
  <text x="783" y="465" text-anchor="middle" class="mono">/cmd_vel_safe</text>

  <rect x="623" y="533" width="164" height="76" rx="8" fill="#ffffff" stroke="#60a5fa" stroke-width="1.8"/>
  <text x="705" y="563" text-anchor="middle" class="node-title">RosBridgeNode</text>
  <text x="705" y="584" text-anchor="middle" class="node-sub">ROS API facade</text>
  <text x="705" y="602" text-anchor="middle" class="mono">topics/actions/services</text>

  <!-- Web/operator -->
  <rect x="940" y="162" width="184" height="90" rx="8" fill="#ffffff" stroke="#22c55e" stroke-width="1.8"/>
  <rect x="940" y="162" width="184" height="20" rx="8" fill="#dcfce7" stroke="none"/>
  <circle cx="955" cy="172" r="4" fill="#ef4444" opacity="0.8"/>
  <circle cx="968" cy="172" r="4" fill="#f59e0b" opacity="0.8"/>
  <circle cx="981" cy="172" r="4" fill="#10b981" opacity="0.8"/>
  <text x="1032" y="207" text-anchor="middle" class="node-title">Web UI</text>
  <text x="1032" y="228" text-anchor="middle" class="node-sub">map, pose, command</text>

  <rect x="940" y="309" width="184" height="86" rx="8" fill="#ffffff" stroke="#22c55e" stroke-width="1.8"/>
  <text x="1032" y="340" text-anchor="middle" class="node-title">FastAPI + gRPC</text>
  <text x="1032" y="361" text-anchor="middle" class="node-sub">stack control</text>
  <text x="1032" y="380" text-anchor="middle" class="node-sub">navigation API</text>

  <rect x="940" y="475" width="184" height="76" rx="8" fill="#ffffff" stroke="#22c55e" stroke-width="1.8"/>
  <text x="1032" y="505" text-anchor="middle" class="node-title">Operator command</text>
  <text x="1032" y="526" text-anchor="middle" class="node-sub">goal, manual cmd_vel</text>

  <!-- Flow arrows -->
  <!-- SDK telemetry -->
  <path d="M212 203 C242 203, 258 190, 294 190" fill="none" stroke="#9333ea" stroke-width="2.4" marker-end="url(#arrow-purple)"/>
  <rect x="222" y="174" width="66" height="20" rx="4" fill="#ffffff" opacity="0.95"/>
  <text x="255" y="188" text-anchor="middle" class="small">SDK DDS</text>

  <path d="M387 235 L387 278" fill="none" stroke="#16a34a" stroke-width="2.4" marker-end="url(#arrow-green)"/>
  <rect x="398" y="249" width="77" height="20" rx="4" fill="#ffffff" opacity="0.95"/>
  <text x="436" y="263" text-anchor="middle" class="small">state data</text>

  <path d="M480 328 C510 328, 528 291, 560 291" fill="none" stroke="#16a34a" stroke-width="2.4" marker-end="url(#arrow-green)"/>
  <rect x="492" y="291" width="60" height="36" rx="4" fill="#ffffff" opacity="0.95"/>
  <text x="522" y="305" text-anchor="middle" class="small">/a2/raw</text>
  <text x="522" y="319" text-anchor="middle" class="small">/battery</text>

  <path d="M690 291 L718 291" fill="none" stroke="#16a34a" stroke-width="2.0" marker-end="url(#arrow-green)"/>
  <path d="M783 335 C783 396, 745 507, 719 533" fill="none" stroke="#16a34a" stroke-width="2.0" marker-end="url(#arrow-green)"/>
  <path d="M625 335 C625 406, 662 505, 690 533" fill="none" stroke="#16a34a" stroke-width="2.0" marker-end="url(#arrow-green)"/>

  <!-- Sensor data -->
  <path d="M212 456 C250 456, 250 405, 300 405 L520 405 C545 405, 545 438, 560 438" fill="none" stroke="#2563eb" stroke-width="2.4" marker-end="url(#arrow-blue)"/>
  <rect x="430" y="362" width="108" height="36" rx="4" fill="#ffffff" opacity="0.95"/>
  <text x="484" y="376" text-anchor="middle" class="small">pointcloud</text>
  <text x="484" y="390" text-anchor="middle" class="small">IMU</text>

  <path d="M692 438 L718 438" fill="none" stroke="#2563eb" stroke-width="2.0" marker-end="url(#arrow-blue)"/>
  <path d="M626 484 C626 506, 650 518, 681 533" fill="none" stroke="#2563eb" stroke-width="2.0" marker-end="url(#arrow-blue)"/>

  <!-- Web telemetry -->
  <path d="M787 571 C842 571, 878 353, 940 353" fill="none" stroke="#16a34a" stroke-width="2.2" marker-end="url(#arrow-green)"/>
  <rect x="818" y="456" width="88" height="36" rx="4" fill="#ffffff" opacity="0.95"/>
  <text x="862" y="470" text-anchor="middle" class="small">pose, map,</text>
  <text x="862" y="484" text-anchor="middle" class="small">status</text>
  <path d="M1032 309 L1032 252" fill="none" stroke="#16a34a" stroke-width="2.0" marker-end="url(#arrow-green)"/>

  <!-- Command path -->
  <path d="M1032 475 L1032 395" fill="none" stroke="#dc2626" stroke-width="2.4" marker-end="url(#arrow-r)"/>
  <path d="M940 352 C865 352, 843 548, 787 571" fill="none" stroke="#dc2626" stroke-width="2.4" stroke-dasharray="7,5" marker-end="url(#arrow-r)"/>
  <rect x="832" y="536" width="83" height="20" rx="4" fill="#ffffff" opacity="0.95"/>
  <text x="873" y="550" text-anchor="middle" class="small">goal/action</text>

  <path d="M705 533 C711 503, 747 486, 783 484" fill="none" stroke="#dc2626" stroke-width="2.0" marker-end="url(#arrow-r)"/>
  <path d="M718 472 C665 536, 548 536, 480 505" fill="none" stroke="#dc2626" stroke-width="2.4" marker-end="url(#arrow-r)"/>
  <rect x="552" y="515" width="103" height="20" rx="4" fill="#ffffff" opacity="0.95"/>
  <text x="603" y="529" text-anchor="middle" class="small">/cmd_vel_safe</text>

  <path d="M387 443 L387 378" fill="none" stroke="#dc2626" stroke-width="2.0" marker-end="url(#arrow-r)"/>
  <path d="M387 443 C365 393, 326 302, 294 218" fill="none" stroke="#dc2626" stroke-width="2.0" stroke-dasharray="6,5" marker-end="url(#arrow-r)"/>
  <path d="M294 190 C258 190, 242 226, 212 226" fill="none" stroke="#dc2626" stroke-width="2.4" marker-end="url(#arrow-r)"/>
  <rect x="218" y="226" width="79" height="20" rx="4" fill="#ffffff" opacity="0.95"/>
  <text x="258" y="240" text-anchor="middle" class="small">SportClient</text>

  <!-- DDS interop rail -->
  <path d="M480 365 C510 365, 528 175, 560 175" fill="none" stroke="#6b7280" stroke-width="1.8" stroke-dasharray="8,5" marker-end="url(#arrow-gray)"/>
  <path d="M560 175 C528 175, 510 473, 480 473" fill="none" stroke="#6b7280" stroke-width="1.8" stroke-dasharray="8,5" marker-end="url(#arrow-gray)"/>
  <rect x="497" y="160" width="47" height="58" rx="5" fill="#ffffff" opacity="0.95" stroke="#e5e7eb"/>
  <text x="520" y="176" text-anchor="middle" class="small">DDS</text>
  <text x="520" y="190" text-anchor="middle" class="small">RTPS</text>
  <text x="520" y="204" text-anchor="middle" class="small">interop</text>

  <!-- Notes -->
  <rect x="560" y="638" width="565" height="52" rx="8" fill="#f9fafb" stroke="#d1d5db" stroke-width="1.2"/>
  <text x="579" y="660" class="label">Unification rule</text>
  <text x="579" y="679" class="small">Unify the main ROS graph if needed. Keep Unitree SDK bridge isolated because SDK2 owns its own CycloneDDS participant/domain.</text>

  <!-- Legend -->
  <g transform="translate(42, 688)">
    <line x1="0" y1="0" x2="34" y2="0" stroke="#16a34a" stroke-width="2.4" marker-end="url(#arrow-green)"/>
    <text x="43" y="4" class="legend">Telemetry / state</text>
    <line x1="166" y1="0" x2="200" y2="0" stroke="#dc2626" stroke-width="2.4" marker-end="url(#arrow-r)"/>
    <text x="209" y="4" class="legend">Command / motion</text>
    <line x1="338" y1="0" x2="372" y2="0" stroke="#2563eb" stroke-width="2.4" marker-end="url(#arrow-blue)"/>
    <text x="381" y="4" class="legend">Lidar / map data</text>
    <line x1="520" y1="0" x2="554" y2="0" stroke="#6b7280" stroke-width="1.8" stroke-dasharray="8,5" marker-end="url(#arrow-gray)"/>
    <text x="563" y="4" class="legend">DDS implementation boundary</text>
  </g>
</svg>
