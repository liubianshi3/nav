
grpc:
  enabled: true
  host: 0.0.0.0
  port: 50051

ros:
  map_topic: /map
  pointcloud_topic: /jt128/dlio/map_points
  pointcloud_fallback_topic: ""
  pointcloud_map_topics:
    - /jt128/dlio/map_points
  websocket_pointcloud_max_points: 8000
  localization_pose_topic: /a2/relocalization/pose
  localization_pose_msg_type: geometry_msgs/msg/PoseWithCovarianceStamped
  odom_topic: /jt128/dlio/odom
  map_pointcloud_topic: /a2/map/pointcloud_3d
  map_representation: pointcloud_map_3d
  relocalization_status_topic: /a2/relocalization/status
  pose_goal_status_topic: /a2/nav2/status

navigation:
  backend: nav2
  action_name: /navigate_to_pose
  goal_topic: /a2/nav3/goal_pose
  goal_frame: map
  cancel_stop_topic: /cmd_vel
  require_localization_ready: true
  require_map_for_goal: true

manual_control:
  enabled: true
  cmd_topic: /cmd_vel_safe
  max_linear_x: 0.4
  max_linear_y: 0.25
  max_angular_z: 0.8
  publish_burst_count: 3
  publish_burst_interval_sec: 0.05

stack:
  workspace: /home/unitree/ws/device-navigation
  network_interface: net1
  map_root: /home/unitree/ws/device-navigation/runtime/maps
  start_script: /home/unitree/ws/device-navigation/src/a2_system/tools/start_jt128_3d_stack.sh
  stop_script: /home/unitree/ws/device-navigation/src/a2_system/tools/stop_jt128_stack.sh
