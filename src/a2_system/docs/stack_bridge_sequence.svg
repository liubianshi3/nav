<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 980" width="1180" height="980">
  <style>
    text { font-family: 'Helvetica Neue', Helvetica, Arial, 'PingFang SC', 'Microsoft YaHei', 'SimHei', sans-serif; fill: #111827; }
    .title { font-size: 20px; font-weight: 600; }
    .sub { font-size: 12px; fill: #6b7280; }
    .head { font-size: 13px; font-weight: 600; }
    .msg { font-size: 12px; }
    .box { fill: #ffffff; stroke: #d1d5db; stroke-width: 1.5; rx: 8; ry: 8; }
    .life { stroke: #d1d5db; stroke-width: 1.2; stroke-dasharray: 6 6; }
    .main { stroke: #2563eb; stroke-width: 1.6; marker-end: url(#arrow-blue); }
    .data { stroke: #16a34a; stroke-width: 1.6; marker-end: url(#arrow-green); }
    .async { stroke: #9333ea; stroke-width: 1.6; stroke-dasharray: 5 4; marker-end: url(#arrow-purple); }
    .alt { fill: #f9fafb; stroke: #d1d5db; stroke-width: 1.3; stroke-dasharray: 7 5; rx: 8; ry: 8; }
    .label-bg { fill: #ffffff; opacity: 0.96; }
  </style>
  <defs>
    <marker id="arrow-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2563eb"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#16a34a"/>
    </marker>
    <marker id="arrow-purple" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#9333ea"/>
    </marker>
  </defs>

  <rect width="1180" height="980" fill="#ffffff"/>
  <text x="40" y="42" class="title">A2 Stack and Bridge Runtime Sequence</text>
  <text x="40" y="64" class="sub">Web/control entrypoints start mapping or navigation, then bridge ROS data and commands between UI, Nav2, safety, and Unitree SDK.</text>

  <g id="participants">
    <rect class="box" x="25" y="92" width="110" height="42"/><text class="head" x="80" y="117" text-anchor="middle">Operator/UI</text>
    <rect class="box" x="155" y="92" width="110" height="42"/><text class="head" x="210" y="117" text-anchor="middle">FastAPI/gRPC</text>
    <rect class="box" x="285" y="92" width="110" height="42"/><text class="head" x="340" y="117" text-anchor="middle">RosBridge</text>
    <rect class="box" x="415" y="92" width="110" height="42"/><text class="head" x="470" y="117" text-anchor="middle">StackCtrl</text>
    <rect class="box" x="545" y="92" width="110" height="42"/><text class="head" x="600" y="117" text-anchor="middle">Scripts</text>
    <rect class="box" x="675" y="92" width="110" height="42"/><text class="head" x="730" y="117" text-anchor="middle">ROS launch</text>
    <rect class="box" x="805" y="92" width="110" height="42"/><text class="head" x="860" y="117" text-anchor="middle">Bridges</text>
    <rect class="box" x="935" y="92" width="110" height="42"/><text class="head" x="990" y="117" text-anchor="middle">Nav2/Safety</text>
    <rect class="box" x="1065" y="92" width="90" height="42"/><text class="head" x="1110" y="117" text-anchor="middle">A2</text>
  </g>

  <g id="lifelines">
    <line class="life" x1="80" y1="134" x2="80" y2="915"/>
    <line class="life" x1="210" y1="134" x2="210" y2="915"/>
    <line class="life" x1="340" y1="134" x2="340" y2="915"/>
    <line class="life" x1="470" y1="134" x2="470" y2="915"/>
    <line class="life" x1="600" y1="134" x2="600" y2="915"/>
    <line class="life" x1="730" y1="134" x2="730" y2="915"/>
    <line class="life" x1="860" y1="134" x2="860" y2="915"/>
    <line class="life" x1="990" y1="134" x2="990" y2="915"/>
    <line class="life" x1="1110" y1="134" x2="1110" y2="915"/>
  </g>

  <g id="mapping-flow">
    <line class="main" x1="80" y1="170" x2="205" y2="170"/><rect class="label-bg" x="92" y="154" width="104" height="18"/><text class="msg" x="144" y="167" text-anchor="middle">start stack/command</text>
    <line class="main" x1="210" y1="215" x2="465" y2="215"/><rect class="label-bg" x="265" y="199" width="147" height="18"/><text class="msg" x="338" y="212" text-anchor="middle">start_mapping/start_navigation</text>
    <line class="main" x1="470" y1="260" x2="595" y2="260"/><rect class="label-bg" x="485" y="244" width="96" height="18"/><text class="msg" x="533" y="257" text-anchor="middle">run stack script</text>
    <path class="main" d="M600 305 C650 305 650 340 600 340"/><rect class="label-bg" x="606" y="310" width="146" height="18"/><text class="msg" x="679" y="323">stop old stack, check network</text>
    <line class="main" x1="600" y1="385" x2="725" y2="385"/><rect class="label-bg" x="606" y="369" width="112" height="18"/><text class="msg" x="662" y="382" text-anchor="middle">launch mapping</text>
    <line class="main" x1="730" y1="430" x2="855" y2="430"/><rect class="label-bg" x="742" y="414" width="104" height="18"/><text class="msg" x="794" y="427" text-anchor="middle">driver, DLIO, map</text>
    <line class="data" x1="860" y1="475" x2="345" y2="475"/><rect class="label-bg" x="496" y="459" width="219" height="18"/><text class="msg" x="606" y="472" text-anchor="middle">map / pointcloud / odom / status topics</text>
    <line class="async" x1="340" y1="520" x2="215" y2="520"/><rect class="label-bg" x="236" y="504" width="84" height="18"/><text class="msg" x="278" y="517" text-anchor="middle">snapshots</text>
    <line class="async" x1="210" y1="565" x2="85" y2="565"/><rect class="label-bg" x="98" y="549" width="100" height="18"/><text class="msg" x="148" y="562" text-anchor="middle">dashboard state</text>
  </g>

  <g id="navigation-alt">
    <rect class="alt" x="35" y="600" width="1110" height="300"/>
    <rect fill="#f9fafb" x="48" y="592" width="115" height="22"/>
    <text class="head" x="58" y="608">alt navigation mode</text>
    <line class="main" x1="600" y1="640" x2="725" y2="640"/><rect class="label-bg" x="607" y="624" width="111" height="18"/><text class="msg" x="663" y="637" text-anchor="middle">launch navigation</text>
    <line class="main" x1="730" y1="680" x2="855" y2="680"/><rect class="label-bg" x="738" y="664" width="114" height="18"/><text class="msg" x="795" y="677" text-anchor="middle">sdk/state/NDT/goal</text>
    <line class="main" x1="730" y1="720" x2="985" y2="720"/><rect class="label-bg" x="797" y="704" width="121" height="18"/><text class="msg" x="858" y="717" text-anchor="middle">Nav2 + collision</text>
    <line class="main" x1="80" y1="760" x2="205" y2="760"/><rect class="label-bg" x="104" y="744" width="76" height="18"/><text class="msg" x="142" y="757" text-anchor="middle">send goal</text>
    <line class="main" x1="210" y1="800" x2="335" y2="800"/><rect class="label-bg" x="230" y="784" width="86" height="18"/><text class="msg" x="273" y="797" text-anchor="middle">publish/call ROS</text>
    <line class="main" x1="340" y1="840" x2="855" y2="840"/><rect class="label-bg" x="477" y="824" width="242" height="18"/><text class="msg" x="598" y="837" text-anchor="middle">/a2/exploration/goal, /cmd_vel, /a2/control/*</text>
    <line class="main" x1="860" y1="860" x2="985" y2="860"/><rect class="label-bg" x="882" y="844" width="81" height="18"/><text class="msg" x="923" y="857" text-anchor="middle">NavigateToPose</text>
    <line class="data" x1="990" y1="820" x2="865" y2="820"/><rect class="label-bg" x="891" y="804" width="74" height="18"/><text class="msg" x="928" y="817" text-anchor="middle">/cmd_vel_safe</text>
    <line class="main" x1="860" y1="780" x2="1105" y2="780"/><rect class="label-bg" x="914" y="764" width="139" height="18"/><text class="msg" x="984" y="777" text-anchor="middle">SportClient Move/gait</text>
    <line class="data" x1="1110" y1="740" x2="865" y2="740"/><rect class="label-bg" x="923" y="724" width="130" height="18"/><text class="msg" x="988" y="737" text-anchor="middle">state/BMS/status</text>
  </g>

  <g id="legend" transform="translate(40, 930)">
    <line class="main" x1="0" y1="0" x2="34" y2="0"/><text class="sub" x="44" y="4">control/startup request</text>
    <line class="data" x1="190" y1="0" x2="224" y2="0"/><text class="sub" x="234" y="4">ROS data/status flow</text>
    <line class="async" x1="380" y1="0" x2="414" y2="0"/><text class="sub" x="424" y="4">async UI update</text>
  </g>
</svg>
