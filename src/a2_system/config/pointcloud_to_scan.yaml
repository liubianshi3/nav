pointcloud_to_laserscan:
  ros__parameters:
    input_topic: /jt128/front/points
    output_topic: /scan
    frame_id: jt128_front_link
    min_height: -0.10
    max_height: 0.90
    min_range: 0.20
    max_range: 10.0
    angle_min: -3.14159
    angle_max: 3.14159
    angle_increment: 0.0174533
    use_inf: true
