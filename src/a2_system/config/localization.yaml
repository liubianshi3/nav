localization_gate:
  ros__parameters:
    # 3D-first default: NDT relocalizer publishes
    # PoseWithCovarianceStamped on /a2/relocalization/pose. The legacy AMCL
    # path overrides this back to /amcl_pose via legacy/localization.launch.py
    # parameters dict, so flipping the default here is safe.
    input_pose_topic: /a2/relocalization/pose
    input_pose_msg_type: geometry_msgs/msg/PoseWithCovarianceStamped
    status_topic: /a2/localization_ok
    status_report_topic: /a2/localization/status
    max_pose_age_sec: 1.5
    latch_valid_pose: true
    latched_pose_timeout_sec: 30.0
    pose_transient_local: false
    allow_zero_stamp_as_now: true
    max_xy_variance: 0.18
    max_yaw_variance: 0.12
