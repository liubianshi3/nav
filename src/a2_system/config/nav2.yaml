goal_bridge:
  ros__parameters:
    exploration_goal_topic: /a2/exploration/goal
    navigation_backend: nav2
    pose_goal_topic: /a2/nav3/goal_pose
    legacy_pose_goal_topic: /goal_pose_
    navigate_action_name: navigate_to_pose
    goal_timeout_sec: 180.0
    action_wait_timeout_sec: 0.5
    map_frame: map
    require_map_frame: true
    max_goal_distance_from_origin: 120.0
    cancel_active_goal_on_new_goal: false
