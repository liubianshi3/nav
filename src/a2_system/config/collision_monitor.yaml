collision_monitor:
  ros__parameters:
    use_sim_time: false
    base_frame_id: "base_link"
    odom_frame_id: "odom"

    # Smart safety: collision_monitor subscribes to Nav2 /cmd_vel,
    # checks /a2/obstacle/points from ground_seg, and publishes
    # safe commands to /cmd_vel_safe.
    # a2_control_bridge subscribes to /cmd_vel_safe.
    cmd_vel_in_topic: "/cmd_vel"
    cmd_vel_out_topic: "/cmd_vel_safe"

    transform_tolerance: 0.5
    source_timeout: 2.0
    base_shift_correction: true
    stop_pub_timeout: 2.0

    # ── Safety polygons ─────────────────────────────────────────
    # Two forward zones: STOP is still enforced, SLOWDOWN only validates
    # perception without throttling live navigation commands. Keeping both
    # zones in front of the body avoids self/ground returns near the robot.
    polygons: ["PolygonStop", "PolygonSlow"]

    PolygonStop:
      type: "polygon"
      points: [1.25, 0.35, 1.25, -0.35, 0.75, -0.35, 0.75, 0.35]
      action_type: "stop"
      max_points: 20
      visualize: true
      polygon_pub_topic: "polygon_stop"
      enabled: true

    PolygonSlow:
      type: "polygon"
      points: [1.75, 0.70, 1.75, -0.70, 0.75, -0.70, 0.75, 0.70]
      action_type: "slowdown"
      max_points: 50000
      slowdown_ratio: 1.0
      visualize: true
      polygon_pub_topic: "polygon_slowdown"
      enabled: true

    # ── Observation sources ─────────────────────────────────────
    # Keep collision_monitor tied to live filtered obstacles only. The 2.5D
    # traversability layer is a planning-cost input, not an emergency-stop source.
    observation_sources: ["obstacle_cloud"]

    obstacle_cloud:
      type: "pointcloud"
      topic: "/a2/obstacle/points"
      min_height: 0.05
      max_height: 0.85
      enabled: true
