occupancy_mapper:
  ros__parameters:
    map_topic: /map
    # Input pointcloud is pre-segmented (ground removed by a2_ground_segmentation).
    # Z limits here act as a secondary safety filter only.
    pointcloud_topic: /a2/obstacle/points
    odom_topic: /odom
    frame_id: map
    width: 600
    height: 600
    resolution: 0.05
    origin_x: -15.0
    origin_y: -15.0
    publish_rate_hz: 2.0
    point_stride: 3
    min_range: 0.3
    max_range: 10.0
    obstacle_min_z: 0.05
    obstacle_max_z: 2.5
    hit_log_odds: 0.9
    miss_log_odds: 0.2
    min_log_odds: -2.0
    max_log_odds: 3.5
    occupied_log_odds: 0.7
    clear_robot_radius_m: 0.35
    mark_free_space: true
    lidar_offset_xyz: [0.32, 0.0, 0.24]
    lidar_offset_yaw: 0.0
