ekf_local_filter_node:
  ros__parameters:
    frequency: 50.0
    sensor_timeout: 0.5
    two_d_mode: false

    map_frame: "map"
    odom_frame: "odom"
    base_link_frame: "base_link"
    world_frame: "odom"

    # Stage 1 local EKF: topic-only validation. Do not publish TF yet.
    publish_tf: false
    publish_acceleration: false
    print_diagnostics: false

    # DLIO is the primary continuous local odometry source. Fuse local pose
    # and planar velocity, but avoid z/roll/pitch until the 3D control contract
    # is explicitly validated against Nav2 and TF consumers.
    odom0: "/jt128/dlio/odom_cov"
    odom0_config:
      [true,  true,  false,   # x, y, z
       false, false, true,    # roll, pitch, yaw
       true,  true,  false,   # vx, vy, vz
       false, false, false,   # vroll, vpitch, vyaw
       false, false, false]   # ax, ay, az

    # A2 body odometry is a raw auxiliary speed cue. Keep it as velocity-only
    # so it cannot fight DLIO for local pose/yaw authority.
    odom1: "/odom"
    odom1_config:
      [false, false, false,   # x, y, z
       false, false, false,   # roll, pitch, yaw
       true,  true,  false,   # vx, vy, vz
       false, false, false,   # vroll, vpitch, vyaw
       false, false, false]   # ax, ay, az

    # Body IMU is initially limited to yaw rate. Roll/pitch/angular-axis fusion
    # should wait until the physical imu_link extrinsic is verified.
    imu0: "/imu/data_cov"
    imu0_config:
      [false, false, false,   # x, y, z
       false, false, false,   # roll, pitch, yaw
       false, false, false,   # vx, vy, vz
       false, false, true,    # vroll, vpitch, vyaw
       false, false, false]   # ax, ay, az

