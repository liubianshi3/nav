a2_sdk_bridge:
  ros__parameters:
    use_mock: false
    state_topic: /a2/raw_state
    battery_topic: /a2/battery
    status_topic: /a2/status
    ipc_socket_path: /run/a2/unitree_agent.sock
    ipc_timeout_ms: 100
    mock_cmd_topic: /cmd_vel
    mock_cmd_timeout_sec: 0.5
    timer_hz: 50.0
    stale_timeout_sec: 0.5
    mock_linear_speed: 0.1
    mock_yaw_rate: 0.15
