map_manager:
  ros__parameters:
    map_root: ${A2_WORKSPACE}/runtime/maps
    occupancy_topic: /map
    map_representation: pointcloud_map_3d
    pointcloud_topic_3d: /unitree/slam_lidar/points1
    pointcloud_snapshot_enabled: true
    pointcloud_max_points: 200000
    active_map_topic: /a2/map_manager/active_map
    mode_topic: /a2/system_mode
    default_mode: mapping
