auto_scan_mission:
  ros__parameters:
    mission_name: auto_scan
    dry_run: false
    dry_run_require_action_server: false
    waypoints_file: ${HOME}/a2_system_ws/src/a2_system/config/scan_waypoints.example.yaml
    reports_root: ${HOME}/a2_system_ws/runtime/reports/scan_mission
    map_topic: /map
    # 3D-first default: pcd_relocalizer_3d publishes pose on
    # /a2/relocalization/pose. legacy AMCL launch overrides via parameters.
    pose_topic: /a2/relocalization/pose
    pose_msg_type: geometry_msgs/msg/PoseWithCovarianceStamped
    odom_topic: /odom
    pointcloud_topic: /jt128/front/points
    localization_ok_topic: /a2/localization_ok
    localization_status_topic: /a2/localization/status
    real_report_topic: /a2/real/report
    map_manager_status_topic: /a2/map_manager/status
    active_map_topic: /a2/map_manager/active_map
    nav_status_topic: /a2/nav2/status
    mission_status_topic: /a2/scan_mission/status
    mission_report_topic: /a2/scan_mission/report
    mission_progress_topic: /a2/scan_mission/progress
    mission_goal_topic: /a2/scan_mission/goal
    goal_frame: map
    require_map_frame: true
    validate_waypoints_against_map: true
    allow_unknown_cells: false
    occupied_threshold: 65
    min_clearance_cells: 0
    navigation_backend: nav2
    pose_goal_topic: /a2/nav3/goal_pose
    navigate_action_name: /navigate_to_pose
    manage_map_service: /map_manager/manage_map
    set_mode_service: /map_manager/set_mode
    mission_mode: mapping
    preflight_timeout_sec: 20.0
    goal_response_timeout_sec: 5.0
    goal_result_timeout_sec: 120.0
    settle_time_sec: 1.5
    stop_on_failure: true
    require_real_ready: true
    require_localization_ready: true
    save_map_on_finish: true
    save_map_on_failure: false
    saved_map_prefix: scan_mission
    position_pass_threshold_m: 0.12
    position_warn_threshold_m: 0.20
    yaw_pass_threshold_rad: 0.15
    yaw_warn_threshold_rad: 0.30
